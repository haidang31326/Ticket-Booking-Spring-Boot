<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập / Đăng Ký</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* CSS ẩn/hiện form với hiệu ứng mờ dần (fade-in) cho mượt */
        .auth-form { display: none; }
        .auth-form.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .toggle-link { cursor: pointer; color: #0d6efd; text-decoration: underline; font-weight: 500;}
        .toggle-link:hover { color: #0a58ca; }
    </style>
</head>
<body class="bg-light">
<!-- Navbar Tối Giản (Chỉ hiện logo vì chưa đăng nhập) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container d-flex justify-content-center">
        <a class="navbar-brand fw-bold fs-4" href="login.html">🎟️ Dane Ticket Booking</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <!-- Hộp thoại báo lỗi/thành công -->
            <div id="auth-alert" class="alert d-none" role="alert"></div>

            <!-- KHUNG CHỨA CẢ 2 FORM -->
            <div class="card shadow-sm mb-4">
                <div class="card-body p-4">

                    <!-- 1. PHẦN ĐĂNG NHẬP -->
                    <div id="login-section" class="auth-form active">
                        <h4 class="card-title text-center mb-4 text-primary fw-bold">Đăng Nhập</h4>
                        <form id="login-form">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" class="form-control" id="login-email" required placeholder="Nhập email của bạn...">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Mật khẩu</label>
                                <input type="password" class="form-control" id="login-password" required placeholder="Nhập mật khẩu...">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold mt-2">ĐĂNG NHẬP</button>
                        </form>
                        <!-- Nút chuyển sang Đăng ký -->
                        <div class="text-center mt-4">
                            <span class="text-muted">Chưa có tài khoản? </span>
                            <span class="toggle-link" onclick="toggleForm('register')">Đăng ký ngay</span>
                        </div>
                    </div>

                    <!-- 2. PHẦN ĐĂNG KÝ -->
                    <div id="register-section" class="auth-form">
                        <h4 class="card-title text-center mb-4 text-success fw-bold">Đăng Ký Tài Khoản</h4>
                        <form id="register-form">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Họ và Tên</label>
                                <input type="text" class="form-control" id="reg-name" required placeholder="VD: Nguyễn Văn A">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" class="form-control" id="reg-email" required placeholder="name@example.com">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Mật khẩu</label>
                                <input type="password" class="form-control" id="reg-password" required placeholder="Tạo mật khẩu...">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Địa chỉ</label>
                                <input type="text" class="form-control" id="reg-address" required placeholder="Nhập địa chỉ của bạn...">
                            </div>
                            <button type="submit" class="btn btn-success w-100 fw-bold mt-2">XÁC NHẬN ĐĂNG KÝ</button>
                        </form>
                        <!-- Nút chuyển về Đăng nhập -->
                        <div class="text-center mt-4">
                            <span class="text-muted">Đã có tài khoản? </span>
                            <span class="toggle-link" onclick="toggleForm('login')">Đăng nhập tại đây</span>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- Nhúng file logic API (chứa luồng chuyển thẳng vào Dashboard) -->
<script src="app.js"></script>

<!-- Script xử lý hiệu ứng lật thẻ Form -->
<script>
    function toggleForm(formType) {
        document.getElementById('login-section').classList.remove('active');
        document.getElementById('register-section').classList.remove('active');
        document.getElementById('auth-alert').classList.add('d-none');

        if (formType === 'register') {
            document.getElementById('register-section').classList.add('active');
        } else {
            document.getElementById('login-section').classList.add('active');
        }
    }
</script>
</body>
</html>
