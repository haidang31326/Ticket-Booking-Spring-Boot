<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Đặt Vé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-800">
<nav class="bg-indigo-600 text-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2">
            <i class="fa-solid fa-ticket rotate-45 text-indigo-200 text-2xl"></i>
            <span class="text-xl font-bold tracking-tight">EventBooking<span class="text-indigo-300">.vn</span></span>
        </a>
        <div class="flex items-center gap-6" id="nav-links"></div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-200 mt-10">
        <div class="text-center mb-8">
            <h2 id="auth-title" class="text-2xl font-bold text-slate-800">Đăng nhập</h2>
            <p class="text-slate-500 mt-2">Vui lòng nhập thông tin của bạn</p>
        </div>

        <form id="auth-form" onsubmit="App.handleAuthSubmit(event)" class="space-y-4">
            <div id="register-fields" style="display: none;">
                <label class="block text-sm font-medium text-slate-700 mb-1">Họ và tên</label>
                <input type="text" id="auth-name" class="w-full border border-slate-300 rounded-lg p-3 outline-none focus:ring-2 focus:ring-indigo-500 mb-4" placeholder="Nguyễn Văn A">

                <label class="block text-sm font-medium text-slate-700 mb-1">Địa chỉ</label>
                <input type="text" id="auth-address" class="w-full border border-slate-300 rounded-lg p-3 outline-none focus:ring-2 focus:ring-indigo-500 mb-4" placeholder="123 Đường ABC">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <input required type="email" id="auth-email" class="w-full border border-slate-300 rounded-lg p-3 outline-none focus:ring-2 focus:ring-indigo-500" value="user@gmail.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Mật khẩu</label>
                <input required type="password" id="auth-password" class="w-full border border-slate-300 rounded-lg p-3 outline-none focus:ring-2 focus:ring-indigo-500" value="password123">
            </div>
            <button type="submit" id="auth-btn" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition mt-6">
                Đăng Nhập
            </button>
        </form>

        <p class="text-center text-sm text-slate-600 mt-6">
            <span id="auth-toggle-text">Chưa có tài khoản?</span>
            <button type="button" onclick="App.toggleAuthMode()" class="text-indigo-600 font-bold ml-1 hover:underline" id="auth-toggle-btn">Đăng ký ngay</button>
        </p>

        <button type="button" onclick="App.testAdminLogin()" class="w-full text-xs text-slate-400 mt-4 underline text-center block">Bấm để điền nhanh Admin (Test)</button>
    </div>
</main>

<script src="app.js"></script>
</body>
</html>
