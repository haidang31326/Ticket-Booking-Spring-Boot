<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập / Đăng Ký</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* CSS ẩn/hiện form với hiệu ứng mờ dần (fade-in) cho mượt */
        .auth-form { display: none; }
        .auth-form.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .toggle-link { cursor: pointer; color: #0d6efd; text-decoration: underline; font-weight: 500;}
        .toggle-link:hover { color: #0a58ca; }
    </style>
</head>
<body class="bg-light">
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="index.html">🎟️ Dane Ticket Booking</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Đặt Vé Mới</a></li>
                <li class="nav-item"><a class="nav-link" href="history.html">Lịch Sử Mua Vé</a></li>
                <li class="nav-item"><a class="nav-link active" href="login.html">Đăng Nhập</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <!-- Hộp thoại báo lỗi/thành công -->
            <div id="auth-alert" class="alert d-none" role="alert"></div>

            <!-- KHUNG CHỨA CẢ 2 FORM -->
            <div class="card shadow-sm mb-4">
                <div class="card-body p-4">

                    <!-- 1. PHẦN ĐĂNG NHẬP (Hiển thị mặc định) -->
                    <div id="login-section" class="auth-form active">
                        <h4 class="card-title text-center mb-4 text-primary">Đăng Nhập</h4>
                        <form id="login-form">
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="login-email" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Mật khẩu</label>
                                <input type="password" class="form-control" id="login-password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold">ĐĂNG NHẬP</button>
                        </form>
                        <!-- Nút chuyển sang Đăng ký -->
                        <div class="text-center mt-4">
                            <span>Chưa có tài khoản? </span>
                            <span class="toggle-link" onclick="toggleForm('register')">Đăng ký ngay</span>
                        </div>
                    </div>

                    <!-- 2. PHẦN ĐĂNG KÝ (Bị ẩn đi, chỉ hiện khi bấm nút) -->
                    <div id="register-section" class="auth-form">
                        <h4 class="card-title text-center mb-4 text-success">Đăng Ký Tài Khoản</h4>
                        <form id="register-form">
                            <div class="mb-3">
                                <label class="form-label">Họ và Tên</label>
                                <input type="text" class="form-control" id="reg-name" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="reg-email" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Mật khẩu</label>
                                <input type="password" class="form-control" id="reg-password" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Địa chỉ</label>
                                <input type="text" class="form-control" id="reg-address" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100 fw-bold">XÁC NHẬN ĐĂNG KÝ</button>
                        </form>
                        <!-- Nút chuyển về Đăng nhập -->
                        <div class="text-center mt-4">
                            <span>Đã có tài khoản? </span>
                            <span class="toggle-link" onclick="toggleForm('login')">Đăng nhập tại đây</span>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- Nhúng file logic API -->
<script src="app.js"></script>

<!-- Script xử lý hiệu ứng lật thẻ Form -->
<script>
    function toggleForm(formType) {
        // Xóa trạng thái active của cả 2 form
        document.getElementById('login-section').classList.remove('active');
        document.getElementById('register-section').classList.remove('active');
        // Ẩn luôn các thông báo lỗi cũ (nếu có)
        document.getElementById('auth-alert').classList.add('d-none');

        // Bật form tương ứng dựa vào nút người dùng bấm
        if (formType === 'register') {
            document.getElementById('register-section').classList.add('active');
        } else {
            document.getElementById('login-section').classList.add('active');
        }
    }
</script>
</body>
</html>
