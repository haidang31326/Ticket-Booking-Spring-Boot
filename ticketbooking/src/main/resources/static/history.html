<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Sử Mua Vé</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<!-- Navbar có nút Trang Chủ và Đăng Xuất -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="dashboard.html">🎟️ Dane Ticket Booking</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link fw-bold text-warning" href="dashboard.html">🏠 Trang Chủ</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Đặt Vé Mới</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="history.html">Lịch Sử Mua Vé</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger fw-bold" href="#" onclick="logoutUser()">🚪 Đăng Xuất</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h3 class="mb-4 text-center">Lịch Sử Giao Dịch Hệ Thống</h3>
    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover table-bordered text-center align-middle">
                <thead class="table-primary">
                <tr>
                    <th>Mã Đơn (Order ID)</th>
                    <th>Mã Khách Hàng</th>
                    <th>Mã Sự Kiện</th>
                    <th>Số Lượng Vé</th>
                    <th>Tổng Tiền</th>
                    <th>Thời Gian Đặt</th>
                </tr>
                </thead>
                <tbody id="order-table-body">
                <tr><td colspan="6">Đang tải dữ liệu từ Backend...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Bắt buộc nhúng app.js để dùng được hàm logoutUser() -->
<script src="app.js"></script>
<script>
    // Gọi API lấy danh sách Order ngay khi load trang
    document.addEventListener('DOMContentLoaded', () => {
        fetch('/api/v1/orders')
            .then(response => response.json())
            .then(orders => {
                const tbody = document.getElementById('order-table-body');
                if(!tbody) return;

                tbody.innerHTML = '';
                if(orders.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6">Chưa có đơn hàng nào được đặt.</td></tr>';
                    return;
                }

                orders.forEach(order => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                            <td><span class="badge bg-secondary">#${order.bookingId}</span></td>
                            <td><strong>${order.customerId}</strong></td>
                            <td>${order.eventId}</td>
                            <td><span class="badge bg-success">${order.ticketCount} vé</span></td>
                            <td class="text-danger fw-bold">${order.totalPrice} VND</td>
                            <td>${order.bookingTime ? order.bookingTime : 'Vừa xong'}</td>
                        `;
                    tbody.appendChild(tr);
                });
            })
            .catch(error => {
                const tbody = document.getElementById('order-table-body');
                if(tbody) tbody.innerHTML = `<tr><td colspan="6" class="text-danger">Lỗi kết nối Server: ${error}</td></tr>`;
            });
    });
</script>
</body>
</html>
