<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vé của tôi - Đặt Vé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-800">
<nav class="bg-indigo-600 text-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2">
            <i class="fa-solid fa-ticket rotate-45 text-indigo-200 text-2xl"></i>
            <span class="text-xl font-bold tracking-tight">EventBooking<span class="text-indigo-300">.vn</span></span>
        </a>
        <div class="flex items-center gap-6" id="nav-links"></div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <h2 class="text-2xl font-bold mb-6 flex items-center gap-2"><i class="fa-solid fa-bag-shopping"></i> Lịch sử vé đã mua</h2>
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <table class="w-full text-left text-sm">
            <thead class="bg-slate-50 border-b border-slate-200 text-slate-600">
            <tr>
                <th class="p-4 font-semibold">Mã Đơn</th>
                <th class="p-4 font-semibold">Sự kiện (ID)</th>
                <th class="p-4 font-semibold">Số lượng</th>
                <th class="p-4 font-semibold">Tổng tiền</th>
                <th class="p-4 font-semibold">Thời gian</th>
            </tr>
            </thead>
            <tbody id="orders-tbody">
            <tr><td colspan="5" class="p-8 text-center text-slate-500">Đang tải dữ liệu...</td></tr>
            </tbody>
        </table>
    </div>
</main>

<script src="app.js"></script>
</body>
</html>
