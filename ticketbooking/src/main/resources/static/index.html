<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Đặt Vé Sự Kiện</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Navbar có nút Trang Chủ và Đăng Xuất -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="dashboard.html">🎟️ Dane Ticket Booking</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link fw-bold text-warning" href="dashboard.html">🏠 Trang Chủ</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="index.html">Đặt Vé Mới</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="history.html">Lịch Sử Mua Vé</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger fw-bold" href="#" onclick="logoutUser()">🚪 Đăng Xuất</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <!-- Cột trái: Danh sách sự kiện -->
        <div class="col-md-8">
            <h3 class="mb-3">Danh Sách Sự Kiện</h3>
            <div class="row" id="event-list">
                <!-- Javascript sẽ tự động vẽ các thẻ sự kiện vào đây -->
            </div>
        </div>

        <!-- Cột phải: Form đặt vé -->
        <div class="col-md-4">
            <div class="card shadow-sm form-booking">
                <div class="card-body">
                    <h4 class="card-title text-center mb-4">Mua Vé Ngay</h4>

                    <div id="alert-box" class="alert d-none" role="alert"></div>

                    <form id="booking-form">
                        <div class="mb-3">
                            <label class="form-label">ID Khách Hàng (UserId)</label>
                            <input type="number" class="form-control" id="userId" readonly placeholder="Hệ thống tự động nhận diện...">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mã Sự Kiện (EventId)</label>
                            <input type="number" class="form-control" id="eventId" required readonly placeholder="Chọn sự kiện bên trái ->">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Số Lượng Vé</label>
                            <input type="number" class="form-control" id="ticketCount" required min="1" value="1">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">XÁC NHẬN ĐẶT VÉ</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Nhúng file Logic Javascript -->
<script src="app.js"></script>
</body>
</html>
