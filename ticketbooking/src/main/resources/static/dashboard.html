<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ - Dane Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .dashboard-card { transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; border-radius: 15px;}
        .dashboard-card:hover { transform: translateY(-10px); box-shadow: 0 15px 25px rgba(0,0,0,0.15); }
        .icon-huge { font-size: 4rem; }
    </style>
</head>
<body class="bg-light">
<!-- Thanh điều hướng cơ bản -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="dashboard.html">🎟️ Dane Ticket Booking</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <!-- Nút Đăng Xuất -->
                <li class="nav-item">
                    <a class="nav-link text-danger fw-bold" href="#" onclick="logoutUser()">🚪 Đăng Xuất</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Nội dung chính -->
<div class="container mt-5 text-center">
    <h1 class="mb-3 fw-bold">Xin chào, <span id="welcome-name" class="text-primary">Khách</span>! 👋</h1>
    <p class="text-muted mb-5 fs-5">Bạn muốn thực hiện thao tác gì hôm nay?</p>

    <div class="row justify-content-center">
        <!-- Nút Đặt Vé Khổng Lồ -->
        <div class="col-md-5 mb-4">
            <div class="card dashboard-card h-100 border-primary shadow-sm" onclick="window.location.href='index.html'">
                <div class="card-body py-5">
                    <div class="icon-huge mb-3">🎫</div>
                    <h3 class="card-title text-primary fw-bold">Mua Vé Sự Kiện</h3>
                    <p class="card-text text-muted">Khám phá và đặt vé các sự kiện âm nhạc, thể thao đang hot nhất.</p>
                </div>
            </div>
        </div>

        <!-- Nút Lịch Sử Khổng Lồ -->
        <div class="col-md-5 mb-4">
            <div class="card dashboard-card h-100 border-success shadow-sm" onclick="window.location.href='history.html'">
                <div class="card-body py-5">
                    <div class="icon-huge mb-3">📜</div>
                    <h3 class="card-title text-success fw-bold">Lịch Sử Mua Vé</h3>
                    <p class="card-text text-muted">Xem lại danh sách các mã vé bạn đã đặt và thông tin thanh toán.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Nhúng file logic -->
<script src="app.js"></script>
<script>
    // Tự động in tên user ra màn hình chào mừng
    document.addEventListener('DOMContentLoaded', () => {
        const userName = localStorage.getItem('loggedInUserName');
        if(userName) {
            // Tách lấy phần tên trước chữ @ nếu user đăng nhập bằng email
            const shortName = userName.split('@');
            document.getElementById('welcome-name').innerText = shortName;
        }
    });
</script>
</body>
</html>
