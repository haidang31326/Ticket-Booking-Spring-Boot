version: '3.8'

services:
  # 1. Service Database MySQL
  mysql-db:
    image: mysql:8.3.0
    container_name: ticketing-db
    environment:
      MYSQL_DATABASE: ticketing
      MYSQL_ROOT_PASSWORD: password
      MYSQL_PASSWORD: password
    ports:
      - "8282:3306"
    # Nếu em có thư mục chứa file init.sql giống bài gốc, hãy giữ nguyên phần volumes này
    volumes:
      - ./docker/mysql:/docker-entrypoint-initdb.d

  # 2. Service Ứng dụng Spring Boot (Backend)
  ticketing-app:
    build: . # Lệnh này bảo Docker tự động đọc Dockerfile ở cùng thư mục để build app
    container_name: ticketing-backend
    ports:
      - "3103:3103" # Cổng chạy web của em
    depends_on:
      - mysql-db # Bắt buộc DB phải chạy lên trước rồi mới chạy App
    environment:
      # TRUYỀN BIẾN MÔI TRƯỜNG THAY THẾ CHO APPLICATION.PROPERTIES TẠI ĐÂY
      - SERVER_PORT=3103
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/ticketing
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_PROFILES_ACTIVE=vps
volumes:
  db-data: